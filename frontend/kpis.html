<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Work Plans - Timeline</title>
    <link rel="stylesheet" href="css/kpis.css">
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>My Work Plans</h1>
        <button class="btn-create">Create Work Plan</button>
    </div>

    <div class="timeline">
        
        <div class="timeline-item">
            <div class="time-label">Q1</div>
            <div class="timeline-node"></div>
            <div class="timeline-card">
                <div class="card-body">
                    <h3>Improve System Performance</h3>
                    <p>Activity: Optimize Database</p>
                </div>
                <div class="status-badge in-progress">In Progress</div>
            </div>
        </div>

        <div class="timeline-item">
            <div class="time-label">Q2</div>
            <div class="timeline-node"></div>
            <div class="timeline-card">
                <div class="card-body">
                    <h3>Improve User Support</h3>
                    <p>Activity: Resolve Tickets</p>
                </div>
                <div class="status-badge completed">Completed</div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
