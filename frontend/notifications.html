<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    <link rel="stylesheet" href="css/notifications.css">
</head>
<body>

    <div class="notifications-container">
        <div class="header-section">
            <h1>Notifications</h1>
            <span class="unread-count">3 New</span>
        </div>

        <div class="notification-list">
            <div class="notification-card action">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </div>
                <div class="content-wrapper">
                    <p class="message">Quarterly Review Q2 is now open.</p>
                    <div class="meta-data">
                        <span class="tag">Action Required</span>
                        <span class="dot">•</span>
                        <span class="time">Just now</span>
                    </div>
                </div>
                <button class="dismiss-btn" title="Dismiss">&times;</button>
            </div>

            <div class="notification-card success">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11"></polyline>
                    </svg>
                </div>
                <div class="content-wrapper">
                    <p class="message">Supervisor has approved your work plan.</p>
                    <div class="meta-data">
                        <span class="tag">Approval</span>
                        <span class="dot">•</span>
                        <span class="time">2 hours ago</span>
                    </div>
                </div>
                <button class="dismiss-btn" title="Dismiss">&times;</button>
            </div>

            <div class="notification-card info">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="11" y2="10"></line>
                    </svg>
                </div>
                <div class="content-wrapper">
                    <p class="message">Annual Appraisal cycle begins next month.</p>
                    <div class="meta-data">
                        <span class="tag">Upcoming</span>
                        <span class="dot">•</span>
                        <span class="time">Yesterday</span>
                    </div>
                </div>
                <button class="dismiss-btn" title="Dismiss">&times;</button>
            </div>
        </div>
    </div>

</body>
</html>
