<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Appraisal Form</title>
    <link rel="stylesheet" href="css/self_appraisal.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1><i class="fa-solid fa-clipboard-check"></i> Self Appraisal Form</h1>
        <p>Your feedback drives our success.</p>
    </div>

    <form>

        <div class="form-group">
            <label>
                <i class="fa-solid fa-trophy"></i>
                Achievements
            </label>
            <textarea placeholder="Share your key achievements..."></textarea>
        </div>

        <div class="form-group">
            <label>
                <i class="fa-solid fa-chart-line"></i>
                Challenges
            </label>
            <textarea placeholder="Describe the challenges you faced..."></textarea>
        </div>

        <div class="form-group">
            <label>
                <i class="fa-solid fa-lightbulb"></i>
                Recommendations
            </label>
            <textarea placeholder="Your suggestions for improvement..."></textarea>
        </div>

        <button type="submit">Submit Appraisal</button>

    </form>

</div>

</body>
</html>
