<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mid-Year Review</title>
    <link rel="stylesheet" href="css/midreview.css">
</head>
<body>

    <div class="browser-mockup">
        <div class="title-section">
            <h1>Mid-Year Review</h1>
        </div>

        <div class="score-bar kpi">
            <span>KPI Achievement</span>
            <span>4.2</span>
        </div>

        <div class="score-bar competencies">
            <span>Competencies</span>
            <span>4.5</span>
        </div>

        <div class="overall-section">
            <div class="overall-left">
                <div class="label">Overall Rating</div>
                <div class="score">4.3</div>
            </div>
            <div>
                <svg class="circle-progress">
                    <circle class="circle-bg" cx="30" cy="30" r="25"></circle>
                    <circle class="circle-fill" cx="30" cy="30" r="25"></circle>
                </svg>
            </div>
        </div>

        <div class="divider"></div>

        <div class="footer-actions">
            <button class="feedback-btn">Comments/Feedback</button>
            <div class="placeholder-box"></div>
        </div>
    </div>

</body>
</html>
