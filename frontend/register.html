<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPAS Registration</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="container">

    <div class="register-card">

        <h2>Employee Registration</h2>

        <form>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" required>
            </div>

            <div class="form-group">
                <label>ID Number</label>
                <input type="text" required>
            </div>

            <div class="form-group">
                <label>Department</label>

                <select required>
                    <option>Select Department</option>
                    <option>Trade, industralisation, Tourism,Cooperatives</option>
                    <option>Public service Management</option>
                    <option>Finance and Economic planning</option>
                    <option>Health</option>
                    <option>Agriculture</option>
                    <option>Education, Technical training, Gender</option>
                    <option>Roads,Transport and public work</option>
                    <option>Water,irrigation Natural Resources</option>
                    <option>Youth Affairs, Sports,ICT and Innovation</option>
                    <option>Lands and Urban Management</option>
                </select>
            </div>

            <div class="form-group">
                <label>Directorate</label>

                <select required>
                    <option>Select Directorate</option>
                    <option>Finance & Economic Planning</option>
                    <option>Public Service</option>
                    <option>Health Services</option>
                    <option>Agriculture</option>
                    <option>ICT & E-Government</option>
                </select>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" required>
            </div>

            <button type="submit">Register</button>

        </form>

        <div class="links">
            <a href="login.html">Back to Login</a>
        </div>

    </div>

</div>

</body>
</html>
