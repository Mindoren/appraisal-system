<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports</title>

    <link rel="stylesheet" href="css/reports.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1><i class="fa-solid fa-file-lines"></i> My Reports</h1>
        <p>View and download your appraisal reports.</p>
    </div>

    <div class="cards">

        <div class="card">
            <div class="icon">
                <i class="fa-solid fa-file-pdf"></i>
            </div>

            <h2>Quarterly Review Report</h2>

            <p><strong>Period:</strong> Q1 2026</p>

            <span class="status">Ready</span>

            <button>
                <i class="fa-solid fa-download"></i>
                Download
            </button>
        </div>

        <div class="card">
            <div class="icon">
                <i class="fa-solid fa-file-pdf"></i>
            </div>

            <h2>Mid-Year Report</h2>

            <p><strong>Period:</strong> 2026</p>

            <span class="status">Ready</span>

            <button>
                <i class="fa-solid fa-download"></i>
                Download
            </button>
        </div>

        <div class="card">
            <div class="icon">
                <i class="fa-solid fa-file-pdf"></i>
            </div>

            <h2>Annual Appraisal Report</h2>

            <p><strong>Period:</strong> 2026</p>

            <span class="status">Ready</span>
